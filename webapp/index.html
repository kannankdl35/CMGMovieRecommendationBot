<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>My WatchList</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>📋 My WatchList</h1>
    <span class="count-pill" id="count-pill">0</span>
  </header>

  <main id="content">
    <div id="loading" class="state-message">Loading your watchlist…</div>

    <div id="empty" class="state-message hidden">
      <div class="empty-icon">🎬</div>
      <p>Your watchlist is empty.</p>
      <p class="empty-sub">Add movies or series from a search result and they'll show up here.</p>
    </div>

    <ul id="list" class="card-list hidden"></ul>
  </main>

  <script src="app.js"></script>
</body>
</html>
